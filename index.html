<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Konverter SRT ke VTT Instan</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* Custom scrollbar untuk textarea */
    textarea::-webkit-scrollbar {
      width: 8px;
    }
    textarea::-webkit-scrollbar-track {
      background: #f1f5f9; 
      border-radius: 8px;
    }
    textarea::-webkit-scrollbar-thumb {
      background: #cbd5e1; 
      border-radius: 8px;
    }
    textarea::-webkit-scrollbar-thumb:hover {
      background: #94a3b8; 
    }
  </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-800 font-sans p-4 md:p-8 flex flex-col items-center">

  <!-- Header -->
  <div class="max-w-5xl w-full text-center mb-8">
    <h1 class="text-3xl md:text-4xl font-bold text-slate-900 mb-3 flex items-center justify-center gap-3">
      <i data-lucide="file-text" class="text-blue-600 h-8 w-8"></i>
      Konverter SRT ke VTT
    </h1>
    <p class="text-slate-600">
      Konversi subtitle instan di browser. Mendukung parameter <code class="bg-slate-200 px-1 rounded text-sm">?url=...</code>
    </p>
    
    <!-- Area Pesan Error/Info -->
    <div id="messageArea" class="hidden mt-4 p-3 rounded-lg text-sm max-w-2xl mx-auto"></div>
  </div>

  <!-- Main Container -->
  <div class="max-w-6xl w-full grid grid-cols-1 lg:grid-cols-2 gap-6 relative">
    
    <!-- Panel Kiri: Input SRT -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col">
      <div class="bg-slate-100 px-4 py-3 border-b border-slate-200 flex justify-between items-center">
        <span class="font-semibold text-slate-700">Input File SRT</span>
        <span id="fileNameBadge" class="hidden text-sm bg-blue-100 text-blue-700 px-3 py-1 rounded-full flex items-center gap-1">
          <i data-lucide="check-circle-2" class="w-4 h-4"></i>
          <span id="fileNameText">file.srt</span>
        </span>
      </div>
      
      <div class="p-4 flex-1 flex flex-col gap-4">
        
        <!-- URL Input -->
        <div class="flex gap-2">
          <div class="relative flex-1">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i data-lucide="link" class="w-4 h-4 text-slate-400"></i>
            </div>
            <input 
              type="url" 
              id="urlInput"
              placeholder="Paste URL file .srt di sini..."
              class="w-full pl-10 pr-3 py-2.5 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 focus:bg-white transition-colors"
            >
          </div>
          <button 
            id="fetchBtn"
            class="bg-slate-800 hover:bg-slate-900 text-white px-4 py-2 rounded-xl text-sm font-medium transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2"
          >
            <span id="fetchBtnText">Ambil</span>
          </button>
        </div>

        <div class="relative flex py-2 items-center">
          <div class="flex-grow border-t border-slate-200"></div>
          <span class="flex-shrink-0 mx-4 text-slate-400 text-xs font-medium uppercase tracking-wider">ATAU</span>
          <div class="flex-grow border-t border-slate-200"></div>
        </div>

        <!-- Dropzone -->
        <div 
          id="dropzone"
          class="border-2 border-dashed rounded-xl p-6 flex flex-col items-center justify-center text-center cursor-pointer transition-colors border-slate-300 hover:border-blue-400 hover:bg-slate-50"
        >
          <input 
            type="file" 
            id="fileInput"
            accept=".srt" 
            class="hidden" 
          />
          <i data-lucide="upload-cloud" id="dropzoneIcon" class="h-8 w-8 mb-2 text-slate-400"></i>
          <p class="font-medium text-slate-700 text-sm">Klik atau Tarik file .srt ke sini</p>
        </div>

        <textarea
          id="srtInput"
          class="w-full flex-1 min-h-[200px] p-4 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none font-mono text-sm"
          placeholder="Atau paste teks isi subtitle SRT langsung di sini..."
        ></textarea>
      </div>
    </div>

    <!-- Ikon Panah (Desktop) -->
    <div class="hidden lg:flex absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 bg-blue-600 text-white p-3 rounded-full shadow-lg z-10 border-4 border-slate-50">
      <i data-lucide="arrow-right" class="w-6 h-6"></i>
    </div>

    <!-- Panel Kanan: Output VTT -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col mt-6 lg:mt-0">
      <div class="bg-slate-100 px-4 py-3 border-b border-slate-200 flex justify-between items-center">
        <span class="font-semibold text-slate-700">Output Format VTT</span>
        <div class="flex gap-2">
          <button 
            id="clearBtn"
            class="text-slate-500 hover:text-red-500 p-1.5 rounded-md hover:bg-red-50 transition-colors disabled:opacity-50 disabled:hover:bg-transparent disabled:hover:text-slate-500"
            title="Hapus Semua"
            disabled
          >
            <i data-lucide="trash-2" class="w-[18px] h-[18px]"></i>
          </button>
        </div>
      </div>
      
      <div class="p-4 flex-1 flex flex-col gap-4">
        <textarea
          id="vttOutput"
          class="w-full flex-1 min-h-[300px] lg:min-h-0 p-4 rounded-xl border border-slate-200 bg-slate-50 font-mono text-sm text-slate-700 resize-none outline-none"
          placeholder="Hasil VTT akan muncul di sini secara otomatis..."
          readonly
        ></textarea>

        <button
          id="downloadBtn"
          disabled
          class="w-full py-3 px-4 rounded-xl font-medium flex items-center justify-center gap-2 transition-all shadow-sm bg-slate-200 text-slate-400 cursor-not-allowed"
        >
          <i data-lucide="download" class="w-5 h-5"></i>
          Unduh File .vtt
        </button>
      </div>
    </div>

  </div>

  <script>
    // Inisialisasi Lucide Icons
    lucide.createIcons();

    // DOM Elements
    const srtInput = document.getElementById('srtInput');
    const vttOutput = document.getElementById('vttOutput');
    const urlInput = document.getElementById('urlInput');
    const fetchBtn = document.getElementById('fetchBtn');
    const fetchBtnText = document.getElementById('fetchBtnText');
    const dropzone = document.getElementById('dropzone');
    const dropzoneIcon = document.getElementById('dropzoneIcon');
    const fileInput = document.getElementById('fileInput');
    const downloadBtn = document.getElementById('downloadBtn');
    const clearBtn = document.getElementById('clearBtn');
    const fileNameBadge = document.getElementById('fileNameBadge');
    const fileNameText = document.getElementById('fileNameText');
    const messageArea = document.getElementById('messageArea');

    let currentFileName = 'subtitle.srt';

    // Konversi Utama SRT ke VTT (Tanpa Delay/Instan)
    function convertSrtToVtt(srt) {
      if (!srt || !srt.trim()) return '';
      
      let vtt = 'WEBVTT\n\n';
      // Standarisasi baris baru
      let content = srt.replace(/\r\n/g, '\n');
      // Ganti koma dengan titik pada format waktu (HH:MM:SS,MMM -> HH:MM:SS.MMM)
      content = content.replace(/(\d{2}:\d{2}:\d{2}),(\d{3})/g, '$1.$2');
      
      return vtt + content;
    }

    // Fungsi Update UI
    function updateUI(srt) {
      srtInput.value = srt;
      const vtt = convertSrtToVtt(srt);
      vttOutput.value = vtt;

      const hasContent = srt.trim().length > 0;
      clearBtn.disabled = !hasContent;
      
      if (hasContent) {
        downloadBtn.disabled = false;
        downloadBtn.className = "w-full py-3 px-4 rounded-xl font-medium flex items-center justify-center gap-2 transition-all shadow-sm bg-blue-600 text-white hover:bg-blue-700 hover:shadow-md active:scale-[0.98]";
      } else {
        downloadBtn.disabled = true;
        downloadBtn.className = "w-full py-3 px-4 rounded-xl font-medium flex items-center justify-center gap-2 transition-all shadow-sm bg-slate-200 text-slate-400 cursor-not-allowed";
        fileNameBadge.classList.add('hidden');
      }
    }

    // Fungsi Menampilkan Pesan
    function showMessage(msg, type = 'error') {
      messageArea.textContent = msg;
      messageArea.classList.remove('hidden', 'bg-red-100', 'text-red-700', 'bg-blue-100', 'text-blue-700');
      
      if (type === 'error') {
        messageArea.classList.add('bg-red-100', 'text-red-700');
      } else {
        messageArea.classList.add('bg-blue-100', 'text-blue-700');
      }

      // Hilangkan pesan setelah 5 detik
      setTimeout(() => {
        messageArea.classList.add('hidden');
      }, 7000);
    }

    // Fungsi Fetch dari URL
    async function fetchSubtitle(url) {
      if (!url.trim()) return;
      
      fetchBtn.disabled = true;
      fetchBtnText.textContent = 'Memproses...';
      
      try {
        const response = await fetch(url);
        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
        
        const text = await response.text();
        
        // Ekstrak nama file dari URL
        try {
          const urlObj = new URL(url);
          const pathParts = urlObj.pathname.split('/');
          let name = pathParts[pathParts.length - 1] || 'subtitle_dari_url.srt';
          if (!name.toLowerCase().endsWith('.srt')) name += '.srt';
          currentFileName = name;
          fileNameText.textContent = name;
          fileNameBadge.classList.remove('hidden');
        } catch (e) {
          currentFileName = 'subtitle_dari_url.srt';
        }

        updateUI(text);
        showMessage('Berhasil mengambil subtitle dari URL', 'success');
        
      } catch (error) {
        showMessage(`Gagal mengambil dari URL. Ini biasanya karena pemblokiran CORS dari server asal URL. (Error: ${error.message})`, 'error');
      } finally {
        fetchBtn.disabled = false;
        fetchBtnText.textContent = 'Ambil';
      }
    }

    // Jalankan pada saat halaman dimuat (Deteksi URL Params GET /?url=...)
    window.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const urlToFetch = urlParams.get('url');
      
      if (urlToFetch) {
        urlInput.value = urlToFetch;
        fetchSubtitle(urlToFetch);
      }
    });

    // Event Listeners: URL Button & Enter
    fetchBtn.addEventListener('click', () => fetchSubtitle(urlInput.value));
    urlInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') fetchSubtitle(urlInput.value);
    });

    // Event Listeners: Input Teks Langsung
    srtInput.addEventListener('input', (e) => {
      updateUI(e.target.value);
      fileNameBadge.classList.add('hidden');
    });

    // Event Listeners: File Upload & Drag-Drop
    function processFile(file) {
      if (!file || !file.name.toLowerCase().endsWith('.srt')) {
        showMessage('Harap unggah file berformat .srt');
        return;
      }

      currentFileName = file.name;
      fileNameText.textContent = currentFileName;
      fileNameBadge.classList.remove('hidden');

      const reader = new FileReader();
      reader.onload = (e) => {
        updateUI(e.target.result);
      };
      reader.readAsText(file);
    }

    dropzone.addEventListener('click', () => fileInput.click());
    
    fileInput.addEventListener('change', (e) => {
      if (e.target.files.length > 0) processFile(e.target.files[0]);
    });

    dropzone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropzone.classList.add('border-blue-500', 'bg-blue-50');
      dropzoneIcon.classList.replace('text-slate-400', 'text-blue-500');
    });

    dropzone.addEventListener('dragleave', (e) => {
      e.preventDefault();
      dropzone.classList.remove('border-blue-500', 'bg-blue-50');
      dropzoneIcon.classList.replace('text-blue-500', 'text-slate-400');
    });

    dropzone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropzone.classList.remove('border-blue-500', 'bg-blue-50');
      dropzoneIcon.classList.replace('text-blue-500', 'text-slate-400');
      
      if (e.dataTransfer.files.length > 0) {
        processFile(e.dataTransfer.files[0]);
      }
    });

    // Event Listeners: Aksi Tombol Download & Clear
    downloadBtn.addEventListener('click', () => {
      const vtt = vttOutput.value;
      if (!vtt) return;

      const blob = new Blob([vtt], { type: 'text/vtt' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = currentFileName.replace(/\.[^/.]+$/, "") + ".vtt";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    });

    clearBtn.addEventListener('click', () => {
      srtInput.value = '';
      vttOutput.value = '';
      urlInput.value = '';
      fileInput.value = '';
      currentFileName = 'subtitle.srt';
      updateUI('');
      messageArea.classList.add('hidden');
    });

  </script>
</body>
</html>
